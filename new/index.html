<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Extension Manager Dashboard</title>
    <!-- Core M3 Styles -->
    <link href="css/Main.css" rel="stylesheet" type="text/css" />
    <link href="css/Index.css" rel="stylesheet" type="text/css" />
</head>

<body id="AppBody" class="LightMode">

    <!-- Left Dashboard / Details Panel -->
    <aside class="SidebarPanel" id="SidebarPanel">
        <img src="icons/icon-128.png" alt="Extension Logo" class="SelectedExtensionIcon" id="SelectedIcon">
        <h2 class="SelectedExtensionTitle" id="SelectedTitle">Extension Dashboard</h2>
        <p class="SelectedExtensionDesc" id="SelectedDesc">Select an extension from the grid to view details and
            options.</p>

        <div class="SidebarStats">
            <div class="StatItem">
                <span class="StatCount" id="CountInstalled">0</span>
                <span class="StatLabel">Installed</span>
            </div>
            <div class="StatItem">
                <span class="StatCount" id="CountDisabled">0</span>
                <span class="StatLabel">Disabled</span>
            </div>
        </div>
        <!-- Insert this inside <aside class="SidebarPanel"> right below </div> of SidebarStats -->

        <div class="WorkspaceContainer" id="WorkspaceContainer" style="padding: 24px 0 0 0;">
            <div class="WorkspaceHeader">
                <span class="WorkspaceTitle">Workspaces</span>
                <button class="BtnText" id="BtnSaveWorkspace">+ Save Current</button>
            </div>
            <div class="WorkspaceList" id="WorkspaceList" style="flex-wrap: wrap;">
                <!-- Chips dynamically injected here -->
            </div>
        </div>
    </aside>

    <!-- Main Grid Content -->
    <main class="MainPanel" id="MainPanel">
        <header class="MainHeader">
            <div class="SearchField">
                <span style="color:var(--ColorOutline)">🔍</span>
                <input type="text" class="SearchInput" id="SearchInput" placeholder="Search installed extensions...">
            </div>

            <div class="ActionGroup">
                <button class="FilledButton" id="BtnDisableAll">
                    🚫 Disable All
                </button>
                <button class="FilledButton" id="BtnEnableAll"
                    style="background-color:var(--ColorSuccess); color:white;">
                    ⚡ Enable All
                </button>
            </div>
        </header>

        <!-- Dynamic Extension Grid Container -->
        <div class="ExtensionGrid" id="ExtensionGrid">

            <!-- MOCK ITEM (To be generated by JS in Stage 2) -->
            <div class="GridCard" id="ExtCard_Mock1">
                <div class="GridCardHeader">
                    <img src="icons/icon-128.png" alt="Icon" class="GridCardIcon">
                    <div class="ToggleSwitch IsActive" id="Toggle_Mock1"></div>
                </div>
                <div class="ExtensionInfo">
                    <h3 class="ExtensionTitle">Sample Addon Manager</h3>
                    <p class="ExtensionDescription">Manage and control your browser extensions more easily. This is a
                        longer description for the grid card.</p>
                </div>
                <button class="IconButton" title="Uninstall" style="align-self: flex-end;">🗑</button>
            </div>
            <!-- END MOCK ITEM -->

        </div>
        <!-- Settings Modal -->
        <div class="SettingsBackdrop" id="SettingsBackdrop">
            <div class="SettingsModal">
                <h2 class="SettingsTitle">⚙ Settings</h2>

                <div class="FormGroup">
                    <label class="FormLabel">Theme Mode</label>
                    <select class="SelectInput" id="InputTheme">
                        <option value="LightMode">Light Theme</option>
                        <option value="DarkMode">Dark Theme</option>
                    </select>
                </div>

                <div class="FormGroup">
                    <label class="FormLabel">Sort Extensions By</label>
                    <select class="SelectInput" id="InputSort">
                        <option value="name">Alphabetical (A-Z)</option>
                        <option value="status">Status (Enabled First)</option>
                    </select>
                </div>

                <div class="SettingsActions">
                    <button class="FilledButton" id="BtnCloseSettings">Close</button>
                </div>
            </div>
        </div>
    </main>

    <script src="js/Main.js"></script>
</body>

</html>
