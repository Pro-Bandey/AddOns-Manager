<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Extension Manager</title>
    <!-- Core M3 Styles -->
    <link href="css/Main.css" rel="stylesheet" type="text/css" />
    <link href="css/Popup.css" rel="stylesheet" type="text/css" />
</head>

<body id="AppBody" class="LightMode">

    <!-- Top Navigation with Search & Actions -->
    <nav class="TopNavigation" id="TopNavigation">
        <div class="SearchContainer">
            <div class="SearchField">
                <!-- Fallback symbol until icons are added -->
                <span style="color:var(--ColorOutline)">🔍</span>
                <input type="text" class="SearchInput" id="SearchInput" placeholder="Search extensions...">
            </div>
        </div>
        <div class="ActionGroup">
            <button class="IconButton" id="BtnDisableAll" title="Disable All">🚫</button>
            <button class="IconButton" id="BtnEnableAll" title="Enable All">⚡</button>
            <button class="IconButton" id="BtnFullscreen" title="Fullscreen">⛶</button>
            <button class="IconButton" id="BtnSettings" title="Settings">⚙</button>
        </div>
    </nav>

    <!-- Content Area -->
    <main class="MainContent" id="MainContent">
        <header class="StatsHeader">
            <div class="StatItem">
                <span class="StatCount" id="CountInstalled">0</span>
                <span class="StatLabel">Installed</span>
            </div>
            <div class="StatItem">
                <span class="StatCount" id="CountDisabled">0</span>
                <span class="StatLabel" style="color:var(--ColorError)">Disabled</span>
            </div>
        </header>

        <!-- Insert this right below </header> and above <div class="ExtensionList"> -->
        
        <div class="WorkspaceContainer" id="WorkspaceContainer">
            <div class="WorkspaceHeader">
                <span class="WorkspaceTitle">Workspaces</span>
                <button class="BtnText" id="BtnSaveWorkspace">+ Save Current</button>
            </div>
            <div class="WorkspaceList" id="WorkspaceList">
                <!-- Chips dynamically injected here -->
            </div>
        </div>

        <!-- Dynamic Extension List Container -->
        <div class="ExtensionList" id="ExtensionList">

            <!-- MOCK ITEM (To be generated by JS in Stage 2) -->
            <div class="ExtensionCard" id="ExtCard_Mock1">
                <img src="icons/icon-128.png" alt="Icon" class="ExtensionIcon">
                <div class="ExtensionInfo">
                    <h3 class="ExtensionTitle">Sample Addon Manager</h3>
                    <p class="ExtensionDescription">Manage and control your browser extensions more easily.</p>
                </div>
                <div class="ExtensionActions">
                    <!-- Custom Vanilla M3 Toggle -->
                    <div class="ToggleSwitch IsActive" id="Toggle_Mock1"></div>
                    <button class="IconButton" title="Uninstall">🗑</button>
                </div>
            </div>
            <!-- END MOCK ITEM -->

        </div>
    </main>
    <!-- Settings Modal -->
    <div class="SettingsBackdrop" id="SettingsBackdrop">
        <div class="SettingsModal">
            <h2 class="SettingsTitle">⚙ Settings</h2>

            <div class="FormGroup">
                <label class="FormLabel">Theme Mode</label>
                <select class="SelectInput" id="InputTheme">
                    <option value="LightMode">Light Theme</option>
                    <option value="DarkMode">Dark Theme</option>
                </select>
            </div>

            <div class="FormGroup">
                <label class="FormLabel">Sort Extensions By</label>
                <select class="SelectInput" id="InputSort">
                    <option value="name">Alphabetical (A-Z)</option>
                    <option value="status">Status (Enabled First)</option>
                </select>
            </div>

            <div class="SettingsActions">
                <button class="FilledButton" id="BtnCloseSettings">Close</button>
            </div>
        </div>
    </div>
    <script src="js/Popup.js"></script>
</body>

</html>
