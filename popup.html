<!DOCTYPE html>
<html>

<head>
    <meta http-equiv="Content-Type" content="text/html;charset=UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/popup.css">
</head>

<body>

    <div id="mainBox">
        <div class="PopupHeader">
            <input type="text" id="SearchInput" placeholder="Search...">
            <select id="ProfileSelect">
            </select>
            <select id="LayoutSelect"></select>
            <select id="ThemeSelect">
                <option value="Auto">Auto</option>
                <option value="LightMode">Light</option>
                <option value="DarkMode">Dark</option>
            </select>
            <button id="BtnDashboard" class="BtnDash">
                <svg class="icon"><use href="icons/icons.svg#icon-settings"></use></svg>
            </button>
        </div>
        <hr>
        <ul id="BoxActives" class="BoxActives"></ul>
        <div class="DisableText" id="DisableHeader">
            <hr>Disabled Exts
        </div>
        <ul id="BoxInActives" class="BoxInActives"></ul>
    </div>

    <div id="rightClickMenu" class="showMenu">
        <div class="name" id="ctxName"></div>
        <ul>
            <li id="ctxLock">Unlock</li>
            <li id="ctxOptions">Options</li>
            <li id="ctxUninstall">Uninstall</li>
            <li id="ctxHomepage">Homepage</li>
            <li id="ctxReload">Reload</li>
        </ul>
    </div>

    <script src="js/sharedUtils.js"></script>
    <script src="js/popup.js"></script>
</body>

</html>
