<!DOCTYPE html>
<html>

<head>
  <meta name="description" content="Manage Extensino">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width">
  <title>Extension Manager</title>

  <link href="/assets/css/bootstrap.min.css" rel="stylesheet" type="text/css" />
  <link href="/assets/css/popup.css" rel="stylesheet" type="text/css" />
</head>

<body>
  <!--Navigation Starts-->
  <nav class="row navigation-bar">
    <div class="col-md-7 col-sm-7 col-xs-7">
      <div class="form-group search-field">
        <input type="text" class="form-control search-input" placeholder="Search...">
        <div class="clear-btn"><i class="icon icon-close"></i></div>
      </div>
    </div>
    <div class="col-md-5 col-sm-5 col-xs-5">
      <div class="btn-group btn-group-md rb-nav-button" role="group" aria-label="...">
        <button type="button" class="btn btn-default disable-all-btn" data-tooltip="bottom" data-title="Disable All">
          <i class="icon icon-eye-disabled"></i>
        </button>
        <button type="button" class="btn btn-default enable-all-btn" data-tooltip="bottom" data-title="Enable All">
          <i class="icon icon-eye"></i>
        </button>
        <button type="button" class="btn btn-default open-fullscreen-btn" data-tooltip="bottom" data-title="Fullscreen">
          <i class="icon icon-open"></i>
        </button>
        <button type="button" class="btn btn-default open-settings-btn" data-tooltip="bottom" data-title="Settings">
          <i class="icon icon-options"></i>
        </button>

      </div>
    </div>
  </nav>
  <!--Navigation Ends-->

  <!--Conten Starts-->
  <main class="container-fluid">
    <div class="row title-bar">
      <div class="col-md-8 col-sm-8 col-xs-8">
        <div class="title">Extension Manager</div>
      </div>
      <div class="col-md-4 col-sm-4 col-xs-4 card-container">
        <div class="row">
          <div class="col-md-6 col-sm-6 col-xs-6 details">
            <h3 class="title" id="number-of-installed">0</h3>
            <p class="label">Installed</p>
          </div>
          <div class="col-md-6 col-sm-6 col-xs-6 details">
            <h3 class="title" id="number-of-disabled">0</h3>
            <p class="label">Disabled</p>
          </div>
        </div>
      </div>
    </div>
    <div class="row extension-list card-view">

    </div>


  </main>
  <!--Conten Starts-->

  </div>

  <div class="settings-pan">
    <div class="settings-backdrop">
      <div class="wrapper">
        <div class="settings-title"><i class="icon ion-android-options" style="margin-right:10px;"></i> Settings</div>
          <form class="form-horizontal">
            <div class="form-group">
              <label for="inputEmail3" class="col-sm-4 col-xs-4 control-label">Theme</label>
              <div class="col-sm-8 col-xs-8">
                <select class="form-control theme-input">
                  <option value="light">Light</option>
                  <option value="dark">Dark</option>
                </select>
              </div>
            </div>
            <div class="form-group">
              <label for="inputPassword3" class="col-sm-4 col-xs-4 control-label">Layout</label>
              <div class="col-sm-8 col-xs-8">
                <select class="form-control layout-input">
                  <option value="grid">Grid View</option>
                  <option value="list">List View</option>
                </select>
              </div>
            </div>
            <div class="form-group">
              <div class="col-sm-offset-4 col-xs-offset-4 col-sm-8 col-xs-8">
                <button type="button" class="btn btn-success settings-save-btn">
                  <i class="icon icon-ok xs-icon mr-5"></i><span>Save</span></button>
             
                <button type="button" class="btn btn-default settings-reset-btn">
                  <i class="icon icon-refresh xs-icon mr-5"></i><span>Reset</span></button>
              </div>
            </div>
          </form>
      </div>
    </div>

  </div>

  <div class="rb-tooltip">Hello ToolTip</div>

  <script src="/assets/js/angular.min.js"></script>
  <script src="/assets/js/popup.js"></script>
</body>

</html>
