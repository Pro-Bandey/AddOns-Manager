<!DOCTYPE html>
<html>

<head>
    <title>Dashboard</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/dashboard.css">
</head>

<body>
    <div class="Sidebar">
        <div class="SidebarItem IsActive" data-tab="TabGen">
            <svg class="icon">
               <use href="icons/icons.svg#icon-settings"></use>
            </svg>
            General Settings
        </div>
        <div class="SidebarItem" data-tab="TabGrp">
            <svg class="icon">
               <use href="icons/icons.svg#icon-folder"></use>
            </svg>
            Grouping / Profiling
        </div>
        <div class="SidebarItem" data-tab="TabName">
            <svg class="icon">
               <use href="icons/icons.svg#icon-pen"></use>
            </svg>
            Name & Edit
        </div>
    </div>
    <div class="MainContent">
        <div id="TabGen" class="TabPanel IsVisible">
            <h2>General</h2>
            <br>
            <div class="SettingsRow">
                <span>Theme:</span>
                <div style="display: flex; align-items: center;">
                    <label class="CircRadio">
                        <input type="radio" name="Theme" value="Auto" />
                        <span class="RadioCircle"></span>
                        Auto
                    </label>
                    <label class="CircRadio">
                        <input type="radio" name="Theme" value="LightMode" />
                        <span class="RadioCircle"></span>
                        Light
                    </label>
                    <label class="CircRadio">
                        <input type="radio" name="Theme" value="DarkMode" />
                            <span class="RadioCircle"></span>
                            Dark
                    </label>
                </div>
            </div>
            <div class="SettingsRow">
                <span>Layout:</span>
                <div style="display: flex; align-items: center;">
                    <label class="CircRadio">
                        <input type="radio" name="Layout" value="ListLayout" />
                        <span class="RadioCircle"></span>
                        List
                    </label>
                    <label class="CircRadio">
                        <input type="radio" name="Layout" value="CompactLayout" />
                        <span class="RadioCircle"></span>
                        Compact
                    </label>
                    <label class="CircRadio">
                        <input type="radio" name="Layout" value="GridLayout" />
                        <span class="RadioCircle"></span>
                        Grid
                    </label>
                </div>
            </div>
            <div class="SettingsRow">
                <span>Grid Columns (5 to 10): <span id="ColVal">5</span></span>
                <input type="range" id="GridColumns" min="4" max="7" />
            </div>
            <div class="SettingsRow">
                <span>Icon Size:</span>
                <input type="range" id="IconSize" min="0" max="2" step="1" />
            </div>
            <div class="SettingsRow">
                <span>Show Theme Dropdown (Popup)</span>
                <label class="IosToggle">
                    <input type="checkbox" id="ShowTheme" />
                    <span class="ToggleSlider"></span>
                </label>
            </div>
            <div class="SettingsRow">
                <span>Show DEV Badge</span>
                <label class="IosToggle">
                    <input type="checkbox" id="ShowDev" />
                    <span class="ToggleSlider"></span>
                </label>
            </div>
            <div class="SettingsRow" style="margin-top: 24px; padding-top: 16px;">
                <span>Backup & Restore:</span>
                <div style="display: flex; gap: 8px;">
                    <input type="file" id="ImportFile" accept=".json" style="display: none;" />
                    <button id="BtnImport" class="SelectInput">
                        <svg class="icon">
                            <use href="icons/icons.svg#icon-download"></use>
                        </svg>
                        Import
                    </button>
                    <button id="BtnExport" class="SelectInput">
                        <svg class="icon"><use href="icons/icons.svg#icon-upload"></use></svg>
                        Export
                    </button>
                </div>
            </div>
        </div>

        <div id="TabGrp" class="TabPanel">
            <h2>Profiles</h2>
            <br>
            <ul class="group-list-bar" id="ProfileTabs"></ul>
            <div id="GroupGrid" class="FixedGrid9 BoxActives GridLayout Dash"></div>
        </div>

        <div id="TabName" class="TabPanel">
            <h2>Edit Extensions</h2>
            <br>
            <div id="NameGrid" class="FixedGrid4"></div>
        </div>
    </div>

    <div class="InfoModalBackdrop" id="InfoModal">
        <div class="InfoModal">
            <h3 id="ModName">Name</h3>
            <p id="ModVer"></p>
            <p id="ModDesc"></p>
            <p id="ModPerm"></p>
            <p id="ModHome"></p>
            <button class="BtnClose" id="BtnCloseInfoModal">Close</button>
        </div>
    </div>
    
</body>
    <script src="js/sharedUtils.js"></script>
    <script src="js/dashboard.js"></script>
</html>
