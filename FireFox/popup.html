<!DOCTYPE html>
<html>
<head>
  <title>Plugin and Extension Manager</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      width: 300px;
      padding: 10px;
    }
    h2 {
      font-size: 18px;
      margin-bottom: 10px;
    }
    input {
      width: 90%;
      padding: 5px;
      margin-bottom: 10px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
    }
    th, td {
      border: 1px solid #ddd;
      padding: 8px;
      text-align: left;
    }
    th {
      background-color: #f2f2f2;
    }
    button {
      padding: 5px 10px;
      background-color: #f44336;
      color: white;
      border: none;
      cursor: pointer;
    }
    button:disabled {
      background-color: grey;
    }
  </style>
</head>
<body>
  <h2>Plugins and Extensions</h2>
  <input type="text" id="search" placeholder="Search...">
  <table>
    <thead>
      <tr>
        <th>Name</th>
        <th>Type</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody id="plugin-list"></tbody>
  </table>
  <script src="popup.js"></script>
</body>
</html>
